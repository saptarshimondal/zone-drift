<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZoneDrift</title>
  
  <link rel="stylesheet" href="css/input.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@500;700&family=Inter:wght@400;500;600&display=swap');
    
    body { font-family: 'Inter', sans-serif; }
    .font-mono { font-family: 'Fira Code', monospace; }
    
    /* Scrollbar Styling */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }
  </style>
</head>
<body class="w-80 bg-slate-900 text-slate-100 p-5 border border-slate-800 m-0">

  <header class="flex justify-between items-center mb-6">
    <div class="flex items-center gap-2">
      <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path>
      </svg>
      <h1 class="text-lg font-bold tracking-tight text-white">ZoneDrift</h1>
    </div>
    <div id="statusContainer" class="flex items-center gap-1.5 px-2 py-1 bg-emerald-500/10 border border-emerald-500/20 rounded-full">
      <div id="statusDot" class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
      <span id="statusIndicator" class="text-[10px] font-semibold text-emerald-400 uppercase tracking-wider">Active</span>
    </div>
  </header>

  <section class="text-center mb-6">
    <div class="text-4xl font-mono font-bold text-cyan-400 tracking-wide" id="time-readout">
      --:--<span class="text-2xl text-cyan-600">:--</span>
    </div>
    <div class="text-xs font-medium text-slate-400 mt-1.5 flex items-center justify-center gap-1" id="zone-label">
      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.243-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
      Loading...
    </div>
  </section>

  <section class="mb-5">
    <div class="flex bg-slate-800 p-1 rounded-lg border border-slate-700/50">
      <button id="scope-tab" class="flex-1 py-1.5 text-xs font-medium bg-slate-600 text-white rounded-md shadow-sm transition-colors">
        This Tab Only
      </button>
      <button id="scope-global" class="flex-1 py-1.5 text-xs font-medium text-slate-400 hover:text-slate-200 transition-colors">
        Global
      </button>
    </div>
  </section>

  <section class="relative mb-6">
    <label for="tz-search" class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Target Timezone</label>
    <div class="relative">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      </div>
      <input type="text" id="tz-search" placeholder="Search city or code..." class="w-full bg-slate-800 border border-slate-600 rounded-lg py-2 pl-9 pr-3 text-sm text-white focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 placeholder-slate-500 transition-all" autocomplete="off">
    </div>
    <ul id="tz-dropdown" class="hidden absolute w-full mt-1 bg-slate-800 border border-slate-600 rounded-lg shadow-xl max-h-36 overflow-y-auto z-10">
    </ul>
  </section>

  <footer>
    <button id="btn-apply" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-semibold py-2.5 rounded-lg shadow-lg shadow-cyan-900/20 transition-all mb-2 flex justify-center items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
      <span id="apply-text">Apply & Reload Tab</span>
    </button>
    <button id="btn-reset" class="w-full bg-transparent hover:bg-slate-800 border border-slate-700 text-slate-400 hover:text-white font-medium py-2 rounded-lg transition-colors text-sm">
      Reset to System Default
    </button>
  </footer>

  <script type="module" src="popup.js"></script>
</body>
</html>
